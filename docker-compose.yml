services:
  web:
    build: .
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      VOLUNTEER_HUB_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.volunteerhub.rule=Host(`volunteermgmnt.apps.pitsolutions.eu`)
      - traefik.http.routers.volunteerhub.entrypoints=https
      - traefik.http.routers.volunteerhub.tls=true
      - traefik.http.routers.volunteerhub.tls.certresolver=letsencrypt
      - traefik.http.services.volunteerhub.loadbalancer.server.port=80
    volumes:
      - storage:/rails/storage
    networks:
      - app_network
    restart: unless-stopped

  sidekiq:
    build: .
    command: bundle exec sidekiq
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      VOLUNTEER_HUB_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - storage:/rails/storage
    networks:
      - app_network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: volunteer_hub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: volunteer_hub_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10_create_databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volunteer_hub -d volunteer_hub_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  storage:

networks:
  app_network:
    driver: bridge
