services:
  web:
    build: .
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgres://postgres:I5S9v50WSTlca8wSNznuJVRjaSRZ0CTK2kRjZSSqFjt4Itijdjh5L0Th0HWyvqZ7@aocc4k48gok0o8koowsog8c4:5432/postgres
      CACHE_DATABASE_URL: postgres://postgres:I5S9v50WSTlca8wSNznuJVRjaSRZ0CTK2kRjZSSqFjt4Itijdjh5L0Th0HWyvqZ7@aocc4k48gok0o8koowsog8c4:5432/postgres_cache
      QUEUE_DATABASE_URL: postgres://postgres:I5S9v50WSTlca8wSNznuJVRjaSRZ0CTK2kRjZSSqFjt4Itijdjh5L0Th0HWyvqZ7@aocc4k48gok0o8koowsog8c4:5432/postgres_queue
      CABLE_DATABASE_URL: postgres://postgres:I5S9v50WSTlca8wSNznuJVRjaSRZ0CTK2kRjZSSqFjt4Itijdjh5L0Th0HWyvqZ7@aocc4k48gok0o8koowsog8c4:5432/postgres_cable
      REDIS_URL: redis://redis:6379/1
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.volunteerhub.rule=Host(`volunteermgmnt.apps.pitsolutions.eu`)
      - traefik.http.routers.volunteerhub.entrypoints=https
      - traefik.http.routers.volunteerhub.tls=true
      - traefik.http.routers.volunteerhub.tls.certresolver=letsencrypt
      - traefik.http.services.volunteerhub.loadbalancer.server.port=80
    volumes:
      - storage:/rails/storage
    networks:
      - app_network
    restart: unless-stopped

  sidekiq:
    build: .
    command: bundle exec sidekiq
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgres://postgres:I5S9v50WSTlca8wSNznuJVRjaSRZ0CTK2kRjZSSqFjt4Itijdjh5L0Th0HWyvqZ7@aocc4k48gok0o8koowsog8c4:5432/postgres
      CACHE_DATABASE_URL: postgres://postgres:I5S9v50WSTlca8wSNznuJVRjaSRZ0CTK2kRjZSSqFjt4Itijdjh5L0Th0HWyvqZ7@aocc4k48gok0o8koowsog8c4:5432/postgres_cache
      QUEUE_DATABASE_URL: postgres://postgres:I5S9v50WSTlca8wSNznuJVRjaSRZ0CTK2kRjZSSqFjt4Itijdjh5L0Th0HWyvqZ7@aocc4k48gok0o8koowsog8c4:5432/postgres_queue
      CABLE_DATABASE_URL: postgres://postgres:I5S9v50WSTlca8wSNznuJVRjaSRZ0CTK2kRjZSSqFjt4Itijdjh5L0Th0HWyvqZ7@aocc4k48gok0o8koowsog8c4:5432/postgres_cable
      REDIS_URL: redis://redis:6379/1
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - storage:/rails/storage
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

volumes:
  redis_data:
  storage:

networks:
  app_network:
    driver: bridge
